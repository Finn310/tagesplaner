<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#ff6a00"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Tagesplaner</title>
<link rel="manifest" href="manifest.json"/>
<style>
:root{
  --bg:#0a0a0a;
  --s1:#141414;
  --s2:#1e1e1e;
  --s3:#282828;
  --s4:#323232;
  --orange:#ff6a00;
  --orange2:#ff8c00;
  --orangeL:rgba(255,106,0,0.15);
  --orangeLL:rgba(255,106,0,0.07);
  --white:#f0f0f0;
  --gray:#888;
  --gray2:#555;
  --border:#2a2a2a;
  --success:#22c55e;
  --successL:rgba(34,197,94,0.15);
  --danger:#ef4444;
  --dangerL:rgba(239,68,68,0.15);
  --r:14px;
  --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column;}

/* ── ICONS ── */
.ico{display:block;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* ── HEADER ── */
header{background:var(--s1);padding:14px 16px 10px;flex-shrink:0;border-bottom:1px solid var(--border);}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.header-title{display:flex;align-items:center;gap:9px;}
.header-title svg{color:var(--orange);width:22px;height:22px;}
header h1{font-size:1.2rem;font-weight:800;color:var(--white);}
.header-date{font-size:0.75rem;color:var(--gray);margin-top:3px;padding-left:31px;}
.icon-btn{width:34px;height:34px;border-radius:var(--r2);border:1px solid var(--border);background:var(--s2);color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn svg{width:16px;height:16px;}
.icon-btn:active{background:var(--s3);}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;background:var(--s1);border-top:1px solid var(--border);flex-shrink:0;position:relative;z-index:50;}
.nav-btn{flex:1;padding:10px 4px 12px;border:none;background:transparent;color:var(--gray);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border-top:2px solid transparent;transition:all .18s;}
.nav-btn svg{width:20px;height:20px;}
.nav-btn span{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.nav-btn.active{color:var(--orange);border-top-color:var(--orange);}

/* ── SCROLL CONTAINER ── */
.view{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;}
.view.active{display:flex;}
.scroll-inner{padding-bottom:20px;}

/* ── WEEK STRIP ── */
.week-strip{display:flex;gap:7px;padding:11px 14px;overflow-x:auto;scrollbar-width:none;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.week-strip::-webkit-scrollbar{display:none;}
.day-chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;border-radius:11px;cursor:pointer;border:2px solid transparent;background:var(--s2);transition:all .18s;min-width:46px;}
.day-chip.active{border-color:var(--orange);background:var(--orangeL);}
.day-chip.today .day-num{color:var(--orange);}
.day-chip .day-lbl{font-size:0.62rem;color:var(--gray);text-transform:uppercase;font-weight:600;}
.day-chip .day-num{font-size:1rem;font-weight:800;color:var(--white);}
.day-chip .day-dot{width:5px;height:5px;border-radius:50%;background:transparent;transition:background .2s;}
.day-chip.has-items .day-dot{background:var(--orange);}
.day-chip.all-done .day-dot{background:var(--success);}

/* ── PROGRESS ── */
.prog-wrap{padding:14px 16px 10px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.prog-lbl{font-size:0.8rem;color:var(--gray);}
.prog-pct{font-size:1.6rem;font-weight:900;color:var(--orange);line-height:1;}
.prog-bg{height:8px;background:var(--s3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── NUTR SUMMARY ── */
.nutr-summary{padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
.nutr-pill{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:8px 11px;}
.nutr-pill-label{font-size:0.63rem;color:var(--gray);text-transform:uppercase;font-weight:700;letter-spacing:.4px;display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.nutr-pill-label svg{width:12px;height:12px;}
.nutr-pill-val{font-size:0.85rem;font-weight:800;}
.nutr-pill-bar{height:4px;background:var(--s3);border-radius:99px;overflow:hidden;margin-top:4px;}
.nutr-pill-fill{height:100%;border-radius:99px;transition:width .4s;}
.c-orange{color:var(--orange);}
.c-blue{color:#60a5fa;}
.c-purple{color:#c084fc;}
.c-green{color:#4ade80;}
.f-orange{background:var(--orange);}
.f-blue{background:#60a5fa;}
.f-purple{background:#c084fc;}
.f-green{background:#4ade80;}
.f-danger{background:var(--danger)!important;}

/* ── MAIN CONTENT ── */
.content-pad{padding:10px 16px 80px;}
.section-hd{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gray2);margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.section-hd::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── TODO CARD ── */
.todo-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px;transition:opacity .2s,box-shadow .15s;}
.todo-card.done{opacity:.42;}
.todo-card.done .todo-text{text-decoration:line-through;color:var(--gray2);}
.todo-card.dragging{opacity:.3;box-shadow:0 0 0 2px var(--orange);}
.todo-card.drag-over{border-color:var(--orange);background:var(--orangeLL);}

.drag-handle{width:18px;display:flex;align-items:center;justify-content:center;color:var(--gray2);cursor:grab;flex-shrink:0;touch-action:none;padding-top:2px;}
.drag-handle svg{width:16px;height:16px;}
.drag-handle:active{color:var(--orange);}

.todo-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.todo-check.checked{background:var(--success);border-color:var(--success);}
.todo-check svg{width:13px;height:13px;stroke:#0a0a0a;stroke-width:3;}

.todo-body{flex:1;min-width:0;}
.todo-text{font-size:.92rem;font-weight:600;word-break:break-word;line-height:1.3;}
.todo-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:.63rem;font-weight:700;display:flex;align-items:center;gap:3px;color:var(--gray);}
.tag svg{width:11px;height:11px;}
.tag-rec{color:var(--orange);}
.tag-nutr{color:#60a5fa;}
.tag-time{color:var(--orange);}

.todo-actions{display:flex;gap:5px;flex-shrink:0;}
.btn-s{width:27px;height:27px;border-radius:8px;border:none;background:var(--s2);color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-s svg{width:13px;height:13px;}
.btn-s:active{transform:scale(.88);}

.nutr-prog{margin-top:7px;}
.nutr-prog-top{display:flex;justify-content:space-between;margin-bottom:3px;}
.nutr-prog-bar{height:5px;background:var(--s3);border-radius:99px;overflow:hidden;}
.nutr-prog-fill{height:100%;border-radius:99px;}

/* ── NUTR OVERVIEW CARD ── */
.nutr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:7px;}
.nutr-card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.nutr-card-title{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:6px;}
.nutr-card-title svg{width:15px;height:15px;}
.nutr-card-pct{font-size:.8rem;font-weight:800;color:var(--orange);}
.nutr-bar{height:6px;background:var(--s3);border-radius:99px;overflow:hidden;}
.nutr-bar-fill{height:100%;border-radius:99px;transition:width .5s;}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--gray2);}
.empty svg{width:36px;height:36px;margin:0 auto 12px;}
.empty p{font-size:.88rem;line-height:1.7;}

/* ── FAB ── */
.fab{position:fixed;bottom:72px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--orange);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(255,106,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .18s;}
.fab svg{width:24px;height:24px;stroke:#0a0a0a;stroke-width:2.5;}
.fab:active{transform:scale(.9);}

/* ──────────────────────────────────────────
   TRACKING TAB
────────────────────────────────────────── */
.track-header{padding:16px 16px 0;}
.track-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.track-month-nav h2{font-size:1rem;font-weight:800;color:var(--white);}
.month-nav-btn{width:32px;height:32px;border-radius:var(--r2);border:1px solid var(--border);background:var(--s2);color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.month-nav-btn svg{width:16px;height:16px;}
.month-nav-btn:active{background:var(--s3);}

/* Stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 14px;}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center;}
.stat-val{font-size:1.5rem;font-weight:900;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:.62rem;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}

/* Calendar heatmap */
.heatmap-wrap{padding:0 16px 16px;}
.heatmap-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gray2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.heatmap-title::after{content:'';flex:1;height:1px;background:var(--border);}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.heatmap-day-lbl{font-size:.6rem;color:var(--gray2);text-align:center;padding-bottom:3px;font-weight:700;}
.heatmap-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;cursor:default;position:relative;transition:transform .15s;}
.heatmap-cell:active{transform:scale(.92);}
.hc-empty{background:var(--s2);color:transparent;}
.hc-none{background:var(--s2);color:var(--gray2);}
.hc-low{background:rgba(255,106,0,.2);color:var(--orange);}
.hc-mid{background:rgba(255,106,0,.45);color:var(--white);}
.hc-high{background:rgba(255,106,0,.7);color:var(--white);}
.hc-full{background:var(--orange);color:#0a0a0a;}
.hc-today{box-shadow:0 0 0 2px var(--white);}

/* Legend */
.heatmap-legend{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--gray);}
.legend-dot{width:10px;height:10px;border-radius:3px;}

/* Streak */
.streak-section{padding:0 16px 16px;}
.streak-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.streak-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.streak-card-val{font-size:2rem;font-weight:900;color:var(--orange);line-height:1;margin-bottom:3px;}
.streak-card-lbl{font-size:.72rem;color:var(--gray);font-weight:600;}
.streak-card-sub{font-size:.65rem;color:var(--gray2);margin-top:2px;}

/* Bar chart */
.bar-section{padding:0 16px 16px;}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--s3);transition:height .4s cubic-bezier(.4,0,.2,1);min-height:3px;}
.bar-fill.active-bar{background:var(--orange);}
.bar-fill.full-bar{background:var(--success);}
.bar-lbl{font-size:.55rem;color:var(--gray2);text-align:center;}

/* ──────────────────────────────────────────
   MODALS
────────────────────────────────────────── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.mo.open{opacity:1;pointer-events:all;}
.md{background:var(--s1);border-radius:22px 22px 0 0;padding:20px 18px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;}
.mo.open .md{transform:translateY(0);}
.md h2{font-size:1.05rem;font-weight:800;margin-bottom:18px;}

.fg{margin-bottom:13px;}
.fg label{display:block;font-size:.7rem;color:var(--gray);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;color:var(--white);font-size:.92rem;outline:none;font-family:inherit;transition:border-color .18s;}
.fg input:focus,.fg select:focus{border-color:var(--orange);}
.fg select option{background:var(--s2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.ttgl{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tbtn{padding:10px;border-radius:var(--r2);border:2px solid var(--border);background:var(--s2);color:var(--gray);cursor:pointer;text-align:center;font-size:.8rem;font-weight:700;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tbtn svg{width:14px;height:14px;}
.tbtn.active{border-color:var(--orange);color:var(--orange);background:var(--orangeL);}

.brow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
.btn{padding:13px;border-radius:var(--r2);border:none;font-size:.92rem;font-weight:800;cursor:pointer;transition:transform .15s;}
.btn-p{background:var(--orange);color:#0a0a0a;}
.btn-x{background:var(--s2);color:var(--gray);border:1px solid var(--border);}
.btn:active{transform:scale(.96);}

.nf{background:var(--s2);border-radius:var(--r2);padding:12px;margin-bottom:13px;}
.nf-title{font-size:.68rem;font-weight:800;text-transform:uppercase;color:var(--orange);margin-bottom:10px;letter-spacing:.5px;display:flex;align-items:center;gap:5px;}
.nf-title svg{width:13px;height:13px;}

input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.55);}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="header-title">
      <svg class="ico" viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      <h1>Tagesplaner</h1>
    </div>
    <button class="icon-btn" onclick="openGoalsModal()">
      <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="header-date" id="header-date"></div>
</header>

<!-- ── TODAY VIEW ── -->
<div class="view active" id="view-today">
  <div class="week-strip" id="week-strip"></div>
  <div class="prog-wrap">
    <div class="prog-row"><span class="prog-lbl">Tagesfortschritt</span><span class="prog-pct" id="prog-pct">0%</span></div>
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="nutr-summary" id="nutr-summary"></div>
  <div class="scroll-inner content-pad" id="main"></div>
</div>

<!-- ── TRACKING VIEW ── -->
<div class="view" id="view-track">
  <div class="scroll-inner">
    <div class="track-header">
      <div class="track-month-nav">
        <button class="month-nav-btn" onclick="trackPrevMonth()">
          <svg class="ico" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="track-month-label"></h2>
        <button class="month-nav-btn" onclick="trackNextMonth()">
          <svg class="ico" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="streak-section">
      <div class="section-hd">Serie</div>
      <div class="streak-cards" id="streak-cards"></div>
    </div>

    <div class="heatmap-wrap">
      <div class="heatmap-title">Tagesübersicht</div>
      <div class="heatmap-grid" id="heatmap-grid"></div>
      <div class="heatmap-legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--s2)"></span>Kein Eintrag</span>
        <span class="legend-item"><span class="legend-dot" style="background:rgba(255,106,0,.2)"></span>1–39%</span>
        <span class="legend-item"><span class="legend-dot" style="background:rgba(255,106,0,.45)"></span>40–69%</span>
        <span class="legend-item"><span class="legend-dot" style="background:rgba(255,106,0,.7)"></span>70–99%</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span>100%</span>
      </div>
    </div>

    <div class="bar-section">
      <div class="section-hd">Wochenverlauf</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>

  </div>
</div>

<!-- ── BOTTOM NAV ── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    <span>Heute</span>
  </button>
  <button class="nav-btn" id="nav-track" onclick="switchView('track')">
    <svg class="ico" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Verlauf</span>
  </button>
</nav>

<button class="fab" id="fab" onclick="openAddModal()">
  <svg class="ico" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ── ADD/EDIT MODAL ── -->
<div class="mo" id="mo-add">
  <div class="md">
    <h2 id="mo-add-title">Neue Aufgabe</h2>
    <div class="fg">
      <label>Kategorie</label>
      <div class="ttgl">
        <button class="tbtn active" id="cat-task" onclick="setCat('task')">
          <svg class="ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Aufgabe
        </button>
        <button class="tbtn" id="cat-nutr" onclick="setCat('nutr')">
          <svg class="ico" viewBox="0 0 24 24"><path d="M3 11h18M5 11a7 7 0 0 1 14 0v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7z"/></svg>Ernaehrung
        </button>
      </div>
    </div>
    <div class="fg">
      <label>Typ</label>

<!-- ── GOALS MODAL ── -->
<div class="mo" id="mo-goals">
  <div class="md">

<script>
// ═══════════════════════════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════════════════════════
const DAYS_S  = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const DAYS_L  = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS  = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTHS_S= ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

const NM = {
  protein:{ l:'Protein',    u:'g',   ic:'bolt',    fc:'f-orange', pc:'c-orange', col:'#ff6a00' },
  carbs:  { l:'Kohlenhydr.',u:'g',   ic:'grain',   fc:'f-blue',   pc:'c-blue',   col:'#60a5fa' },
  fat:    { l:'Fett',       u:'g',   ic:'drop',    fc:'f-purple', pc:'c-purple', col:'#c084fc' },
  kcal:   { l:'Kalorien',   u:'kcal',ic:'flame',   fc:'f-orange', pc:'c-orange', col:'#ff6a00' },
  water:  { l:'Wasser',     u:'ml',  ic:'drop',    fc:'f-green',  pc:'c-green',  col:'#4ade80' },
};
const NUTR_ORDER = ['water','protein','kcal','carbs','fat'];

// SVG icon strings
const SVG = {
  recurring: `<svg class="ico" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,
  once:      `<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>`,
  nutr:      `<svg class="ico" viewBox="0 0 24 24"><path d="M3 11h18M5 11a7 7 0 0 1 14 0v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7z"/></svg>`,
  clock:     `<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>`,
  edit:      `<svg class="ico" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>`,
  trash:     `<svg class="ico" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>`,
  check:     `<svg class="ico" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  drag:      `<svg class="ico" viewBox="0 0 24 24"><circle cx="9" cy="5" r="1.2"/><circle cx="15" cy="5" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="9" cy="19" r="1.2"/><circle cx="15" cy="19" r="1.2"/></svg>`,
  flame:     `<svg class="ico" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 17a2.5 2.5 0 0 0 2.5-2.5c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7.5 7.5 0 1 1-15 0c0-1.153.433-2.294 1-3z"/></svg>`,
  drop:      `<svg class="ico" viewBox="0 0 24 24"><path d="M12 2.69s-6 7.07-6 11a6 6 0 0 0 12 0c0-3.93-6-11-6-11z"/></svg>`,
  bolt:      `<svg class="ico" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  grain:     `<svg class="ico" viewBox="0 0 24 24"><path d="M12 2c1 3 1 5-1 7s-3 5 1 13c4-8 2-11 1-13s-1-4 0-7"/></svg>`,
};
function ic(name){ return SVG[name]||''; }

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let selDate   = todayStr();
let curView   = 'today';
let curCat    = 'task';
let curType   = 'once';
let editId    = null;
let logId     = null;
let trackYear = new Date().getFullYear();
let trackMonth= new Date().getMonth();
let dragSrcId = null;

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function todayStr(){ const d=new Date(); return ds(d); }
function ds(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function p2(n){ return String(n).padStart(2,'0'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function gv(id){ return document.getElementById(id).value; }
function sv(id,v){ document.getElementById(id).value=v||''; }
function num(v){ return Math.max(0,parseFloat(v)||0); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function getMonday(d){
  const dt=new Date(d), day=dt.getDay(), diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff); return dt;
}
function weekDays(){
  const m=getMonday(new Date());
  return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return d; });
}

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
const LS={
  g(k,d){ try{ return JSON.parse(localStorage.getItem(k)??null)??d; }catch{ return d; } },
  s(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
};
const loadItems  = ()=> LS.g('tp_items',[]);
const saveItems  = v => LS.s('tp_items',v);
const loadDone   = ()=> LS.g('tp_done',{});
const saveDone   = v => LS.s('tp_done',v);
const loadLog    = ()=> LS.g('tp_log',{});
const saveLog    = v => LS.s('tp_log',v);
const loadGoals_ = ()=> LS.g('tp_goals',{kcal:2000,protein:150,carbs:250,fat:70,water:3000});
const saveGoals_ = v => LS.s('tp_goals',v);
const loadOrder  = ()=> LS.g('tp_order',{});
const saveOrder  = v => LS.s('tp_order',v);

function getDailyGoal(t){
  const g=loadGoals_();
  const ov=loadItems().find(it=>it.cat==='nutr'&&it.nutrType===t&&it.nutrDaily>0);
  return ov?ov.nutrDaily:(g[t]||0);
}

function getNutrTotal(date,t){
  const log=loadDone(), lg=loadLog();
  const items=loadItems().filter(it=>it.cat==='nutr'&&it.nutrType===t&&(it.type==='recurring'||it.date===date));
  let tot=0;
  items.forEach(it=>{
    const lk=`log_${date}_${it.id}`;
    if(lg[lk]!==undefined) tot+=lg[lk];
    else if(log[doneKey(it,date)]) tot+=(it.nutrTarget||0);
  });
  return tot;
}

// ═══════════════════════════════════════════════════════════
// ITEMS & PROGRESS
// ═══════════════════════════════════════════════════════════
function doneKey(it,date){ return it.type==='once'?`o_${it.id}_${date}`:`r_${it.id}_${date}`; }

function getItemsForDate(date){
  const items=loadItems().filter(it=>it.type==='recurring'||it.date===date);
  const order=loadOrder()[date]||[];
  items.sort((a,b)=>{
    const ia=order.indexOf(a.id), ib=order.indexOf(b.id);
    if(ia!==-1&&ib!==-1) return ia-ib;
    if(ia!==-1) return -1;
    if(ib!==-1) return 1;
    if(a.time&&b.time) return a.time.localeCompare(b.time);
    if(a.time) return -1; if(b.time) return 1;
    return (a.created||'').localeCompare(b.created||'');
  });
  return items;
}

function calcProgress(date){
  const items=getItemsForDate(date);
  if(!items.length) return -1; // -1 = no items (different from 0%)
  const done=loadDone();
  const got=items.filter(it=>done[doneKey(it,date)]).length;
  return Math.round(got/items.length*100);
}

// ═══════════════════════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════════════════════
function switchView(v){
  curView=v;
  document.getElementById('view-today').classList.toggle('active',v==='today');
  document.getElementById('view-track').classList.toggle('active',v==='track');
  document.getElementById('nav-today').classList.toggle('active',v==='today');
  document.getElementById('nav-track').classList.toggle('active',v==='track');
  document.getElementById('fab').style.display=v==='today'?'flex':'none';
  if(v==='track') renderTracking();
}

// ═══════════════════════════════════════════════════════════
// RENDER TODAY
// ═══════════════════════════════════════════════════════════
function renderStrip(){
  const strip=document.getElementById('week-strip');
  const days=weekDays(); const today=todayStr(); const done=loadDone();
  strip.innerHTML='';
  days.forEach(d=>{
    const date=ds(d);
    const items=getItemsForDate(date);
    const allDone=items.length>0&&items.every(it=>done[doneKey(it,date)]);
    const c=document.createElement('div');
    c.className=['day-chip',date===selDate?'active':'',date===today?'today':'',allDone?'all-done':items.length?'has-items':''].filter(Boolean).join(' ');
    c.innerHTML=`<span class="day-lbl">${DAYS_S[d.getDay()]}</span><span class="day-num">${d.getDate()}</span><span class="day-dot"></span>`;
    c.onclick=()=>selectDay(date);
    strip.appendChild(c);
  });
}

function selectDay(date){
  selDate=date; renderToday();
  const chips=document.querySelectorAll('.day-chip');
  const days=weekDays(); const idx=days.findIndex(d=>ds(d)===date);
  if(chips[idx]) chips[idx].scrollIntoView({inline:'center',behavior:'smooth'});
}

function renderHeader(){
  const d=new Date(selDate+'T00:00:00');
  const suf=selDate===todayStr()?' (Heute)':'';
  document.getElementById('header-date').textContent=`${DAYS_L[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}${suf}`;
}

function renderProgress(){
  const p=calcProgress(selDate);
  const pct=p<0?0:p;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
}

function renderNutrSummary(){
  const el=document.getElementById('nutr-summary');
  const goals=loadGoals_();
  const rel=NUTR_ORDER.filter(t=>{
    const items=getItemsForDate(selDate).filter(it=>it.cat==='nutr'&&it.nutrType===t);
    return items.length>0||(goals[t]>0);
  });
  if(!rel.length){ el.innerHTML=''; el.style.display='none'; return; }
  el.style.display='grid';
  el.innerHTML=rel.map(t=>{
    const m=NM[t], got=getNutrTotal(selDate,t), goal=getDailyGoal(t)||goals[t]||0;
    const pct=goal?Math.min(100,Math.round(got/goal*100)):0;
    const over=goal&&got>goal;
    return `<div class="nutr-pill">
      <div class="nutr-pill-label">${ic(m.ic)}<span>${m.l}</span></div>
      <div class="nutr-pill-val ${m.pc}">${Math.round(got)}<small style="font-size:.62rem;font-weight:500;color:var(--gray)"> /${goal||'?'} ${m.u}</small></div>
      <div class="nutr-pill-bar"><div class="nutr-pill-fill ${m.fc}${over?' f-danger':''}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderMain(){
  const main=document.getElementById('main');
  main.innerHTML='';
  const items=getItemsForDate(selDate);
  const done=loadDone();

  const nutrTypes=[...new Set(items.filter(it=>it.cat==='nutr').map(it=>it.nutrType))];
  if(nutrTypes.length){
    const h=document.createElement('div'); h.className='section-hd'; h.textContent='Ernaehrungs-Uebersicht'; main.appendChild(h);
    nutrTypes.forEach(t=>{
      const m=NM[t], got=getNutrTotal(selDate,t), goal=getDailyGoal(t)||0;
      const pct=goal?Math.min(100,Math.round(got/goal*100)):0, over=goal&&got>goal;
      const card=document.createElement('div'); card.className='nutr-card';
      card.innerHTML=`<div class="nutr-card-hd"><span class="nutr-card-title" style="color:${m.col}">${ic(m.ic)}${m.l}</span><span class="nutr-card-pct">${Math.round(got)}/${goal||'?'} ${m.u}${goal?' ('+pct+'%)':''}</span></div><div class="nutr-bar"><div class="nutr-bar-fill ${m.fc}${over?' f-danger':''}" style="width:${pct}%"></div></div>`;
      main.appendChild(card);
    });
  }

  const h2=document.createElement('div'); h2.className='section-hd'; h2.textContent='Aufgaben'; main.appendChild(h2);

  if(!items.length){
    const e=document.createElement('div'); e.className='empty';
    e.innerHTML=`${ic('check')}<p>Noch keine Aufgaben fuer diesen Tag.<br>Tippe auf das Plus-Symbol.</p>`;
    main.appendChild(e); return;
  }

  const list=document.createElement('div'); list.id='todo-list';
  items.forEach(it=>list.appendChild(makeTodoCard(it,done)));
  main.appendChild(list);
}

function makeTodoCard(it,done){
  const key=doneKey(it,selDate), isDone=!!done[key];
  const lg=loadLog(), lk=`log_${selDate}_${it.id}`;
  let nutrHtml='';
  if(it.cat==='nutr'){
    const m=NM[it.nutrType]||NM.protein;
    const logged=lg[lk]!==undefined?lg[lk]:(isDone?it.nutrTarget:0);
    const pct=it.nutrTarget?Math.min(100,Math.round(logged/it.nutrTarget*100)):0;
    nutrHtml=`<div class="nutr-prog">
      <div class="nutr-prog-top">
        <span style="font-size:.67rem;color:${m.col};font-weight:700">${m.l}: ${Math.round(logged)}/${it.nutrTarget||'?'} ${m.u}</span>
        <span style="font-size:.67rem;color:var(--gray)">${pct}%</span>
      </div>
      <div class="nutr-prog-bar"><div class="nutr-prog-fill ${m.fc}" style="width:${pct}%"></div></div>
    </div>`;
  }
  const timeTag=it.time?`<span class="tag tag-time">${ic('clock')}${it.time}</span>`:'';
  const typeTag=it.type==='recurring'?`<span class="tag tag-rec" title="Dauerhaft">${ic('recurring')}</span>`:`<span class="tag" title="Einmalig">${ic('once')}</span>`;
  const catTag=it.cat==='nutr'?`<span class="tag tag-nutr">${ic('nutr')}</span>`:'';

  const div=document.createElement('div');
  div.className='todo-card'+(isDone?' done':'');
  div.dataset.id=it.id;
  div.draggable=true;
  div.innerHTML=`
    <div class="drag-handle" title="Verschieben">${ic('drag')}</div>
    <div class="todo-check${isDone?' checked':''}" onclick="handleCheck('${it.id}')">${isDone?ic('check'):''}</div>
    <div class="todo-body">
      <div class="todo-text">${esc(it.text)}</div>
      <div class="todo-meta">${typeTag}${catTag}${timeTag}</div>
      ${nutrHtml}
    </div>
    <div class="todo-actions">
      <button class="btn-s" onclick="editItem('${it.id}')">${ic('edit')}</button>
      <button class="btn-s" onclick="deleteItem('${it.id}')">${ic('trash')}</button>
    </div>`;

  // HTML5 drag
  div.addEventListener('dragstart',e=>{ dragSrcId=it.id; div.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  div.addEventListener('dragend',()=>{ div.classList.remove('dragging'); document.querySelectorAll('.todo-card').forEach(c=>c.classList.remove('drag-over')); });
  div.addEventListener('dragover',e=>{ e.preventDefault(); if(it.id!==dragSrcId) div.classList.add('drag-over'); });
  div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
  div.addEventListener('drop',e=>{ e.preventDefault(); div.classList.remove('drag-over'); if(dragSrcId&&dragSrcId!==it.id) reorder(dragSrcId,it.id); });

  // Touch drag
  touchDrag(div, it.id);
  return div;
}

function touchDrag(card, itemId){
  const handle=card.querySelector('.drag-handle');
  let startY=0, clone=null, dragging=false, listEl=null;

  handle.addEventListener('touchstart',e=>{
    dragging=true; listEl=card.parentElement;
    startY=e.touches[0].clientY;
    card.classList.add('dragging');
    e.preventDefault();
  },{passive:false});

  handle.addEventListener('touchmove',e=>{
    if(!dragging) return;
    e.preventDefault();
    const dy=e.touches[0].clientY-startY;
    card.style.transform=`translateY(${dy}px)`;
    const touchY=e.touches[0].clientY;
    listEl.querySelectorAll('.todo-card').forEach(el=>{
      if(el===card){el.classList.remove('drag-over');return;}
      const r=el.getBoundingClientRect();
      el.classList.toggle('drag-over', touchY>r.top&&touchY<r.bottom);
    });
  },{passive:false});

  handle.addEventListener('touchend',()=>{
    if(!dragging) return;
    dragging=false;
    card.style.transform='';
    card.classList.remove('dragging');
    const target=listEl.querySelector('.drag-over');
    if(target){ target.classList.remove('drag-over'); const tid=target.dataset.id; if(tid&&tid!==itemId) reorder(itemId,tid); }
  });
}

function reorder(srcId,tgtId){
  const items=getItemsForDate(selDate);
  const ids=items.map(it=>it.id);
  const si=ids.indexOf(srcId), ti=ids.indexOf(tgtId);
  if(si===-1||ti===-1) return;
  ids.splice(si,1); ids.splice(ids.indexOf(tgtId),0,srcId);
  const order=loadOrder(); order[selDate]=ids; saveOrder(order);
  renderToday();
}

// ═══════════════════════════════════════════════════════════
// CHECK / LOG
// ═══════════════════════════════════════════════════════════
function handleCheck(id){
  const it=loadItems().find(x=>x.id===id); if(!it) return;
  if(it.cat==='nutr'&&it.nutrTarget){
    logId=id;
    const m=NM[it.nutrType]||NM.protein;
    document.getElementById('log-title').textContent=it.text;
    document.getElementById('log-desc').textContent=`Wieviel ${m.l} (${m.u}) hast du eingenommen?`;
    document.getElementById('log-lbl').textContent=`Menge in ${m.u}`;
    sv('inp-log',it.nutrTarget||'');
    document.getElementById('mo-log').classList.add('open');
    setTimeout(()=>document.getElementById('inp-log').focus(),320);
    return;
  }
  const done=loadDone(), key=doneKey(it,selDate);
  if(done[key]) delete done[key]; else done[key]=true;
  saveDone(done); renderToday();
}

function closeLogModal(){ document.getElementById('mo-log').classList.remove('open'); logId=null; }
function confirmLog(){
  if(!logId) return;
  const val=num(gv('inp-log'));
  const it=loadItems().find(x=>x.id===logId); if(!it) return;
  const lg=loadLog(); lg[`log_${selDate}_${it.id}`]=val; saveLog(lg);
  const done=loadDone(); done[doneKey(it,selDate)]=true; saveDone(done);
  closeLogModal(); renderToday();
}
document.getElementById('mo-log').addEventListener('click',function(e){if(e.target===this)closeLogModal();});

// ═══════════════════════════════════════════════════════════
// CRUD
// ═══════════════════════════════════════════════════════════
function deleteItem(id){
  if(!confirm('Aufgabe loeschen?')) return;
  saveItems(loadItems().filter(x=>x.id!==id));
  const done=loadDone(); Object.keys(done).forEach(k=>{if(k.includes(`_${id}`))delete done[k];}); saveDone(done);
  const lg=loadLog(); Object.keys(lg).forEach(k=>{if(k.includes(`_${id}`))delete lg[k];}); saveLog(lg);
  const ord=loadOrder(); Object.keys(ord).forEach(d=>{ord[d]=ord[d].filter(x=>x!==id);}); saveOrder(ord);
  renderToday();
}

function editItem(id){
  const it=loadItems().find(x=>x.id===id); if(!it) return;
  editId=id;
  setCat(it.cat||'task'); setType(it.type);
  sv('inp-text',it.text); sv('inp-time',it.time||'');
  if(it.cat==='nutr'){ sv('inp-ntype',it.nutrType||'protein'); sv('inp-ntarget',it.nutrTarget||''); sv('inp-ndaily',it.nutrDaily||''); }
  document.getElementById('mo-add-title').textContent='Aufgabe bearbeiten';
  document.getElementById('mo-add').classList.add('open');
}

function openAddModal(){
  editId=null;
  document.getElementById('mo-add-title').textContent='Neue Aufgabe';
  sv('inp-text',''); sv('inp-time',''); sv('inp-ntarget',''); sv('inp-ndaily','');
  sv('inp-ntype','protein');
  setCat('task'); setType('once');
  document.getElementById('mo-add').classList.add('open');
  setTimeout(()=>document.getElementById('inp-text').focus(),340);
}
function closeAddModal(){ document.getElementById('mo-add').classList.remove('open'); editId=null; }
document.getElementById('mo-add').addEventListener('click',function(e){if(e.target===this)closeAddModal();});

function saveItem(){
  const text=gv('inp-text').trim(); if(!text){document.getElementById('inp-text').focus();return;}
  const item={ id:editId||uid(), text, type:curType, cat:curCat, time:gv('inp-time')||null, date:curType==='once'?selDate:null, created:new Date().toISOString() };
  if(curCat==='nutr'){ item.nutrType=gv('inp-ntype'); item.nutrTarget=num(gv('inp-ntarget')); item.nutrDaily=num(gv('inp-ndaily')); }
  const items=loadItems();
  if(editId){ const i=items.findIndex(x=>x.id===editId); if(i>-1) items[i]=item; }
  else items.push(item);
  saveItems(items); closeAddModal(); renderToday();
}

function setCat(c){
  curCat=c;
  document.getElementById('cat-task').classList.toggle('active',c==='task');
  document.getElementById('cat-nutr').classList.toggle('active',c==='nutr');
  document.getElementById('nf').style.display=c==='nutr'?'block':'none';
  document.getElementById('text-lbl').textContent=c==='nutr'?'Bezeichnung':'Aufgabe';
  document.getElementById('inp-text').placeholder=c==='nutr'?'z.B. 40g Protein bis 11 Uhr':'z.B. Spazieren gehen...';
}
function setType(t){
  curType=t;
  document.getElementById('type-once').classList.toggle('active',t==='once');
  document.getElementById('type-rec').classList.toggle('active',t==='recurring');
}

function openGoalsModal(){
  const g=loadGoals_(); sv('g-kcal',g.kcal); sv('g-protein',g.protein); sv('g-carbs',g.carbs); sv('g-fat',g.fat); sv('g-water',g.water);
  document.getElementById('mo-goals').classList.add('open');
}
function closeGoalsModal(){ document.getElementById('mo-goals').classList.remove('open'); }
function saveGoals(){ saveGoals_({kcal:num(gv('g-kcal'))||2000,protein:num(gv('g-protein'))||150,carbs:num(gv('g-carbs'))||250,fat:num(gv('g-fat'))||70,water:num(gv('g-water'))||3000}); closeGoalsModal(); renderToday(); }
document.getElementById('mo-goals').addEventListener('click',function(e){if(e.target===this)closeGoalsModal();});

// ═══════════════════════════════════════════════════════════
// RENDER TODAY (all together)
// ═══════════════════════════════════════════════════════════
function renderToday(){
  renderStrip(); renderHeader(); renderProgress(); renderNutrSummary(); renderMain();
}

// ═══════════════════════════════════════════════════════════
// TRACKING TAB
// ═══════════════════════════════════════════════════════════
function trackPrevMonth(){ trackMonth--; if(trackMonth<0){trackMonth=11;trackYear--;} renderTracking(); }
function trackNextMonth(){ trackMonth++; if(trackMonth>11){trackMonth=0;trackYear++;} renderTracking(); }

function renderTracking(){
  const today = todayStr();
  const daysInMonth = new Date(trackYear, trackMonth+1, 0).getDate();

  // Build day data for whole month
  const dayData = [];
  for(let d=1; d<=daysInMonth; d++){
    const date = `${trackYear}-${p2(trackMonth+1)}-${p2(d)}`;
    const pct  = calcProgress(date);
    dayData.push({ d, date, pct });
  }

  // Label
  document.getElementById('track-month-label').textContent = `${MONTHS[trackMonth]} ${trackYear}`;

  // ── Stats row
  const withItems = dayData.filter(x=>x.pct>=0);
  const full      = withItems.filter(x=>x.pct===100);
  const partial   = withItems.filter(x=>x.pct>0&&x.pct<100);
  const missed    = withItems.filter(x=>x.pct===0);
  const avg       = withItems.length ? Math.round(withItems.reduce((s,x)=>s+x.pct,0)/withItems.length) : 0;

  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card">
      <div class="stat-val" style="color:var(--success)">${full.length}</div>
      <div class="stat-lbl">100% Tage</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--orange)">${avg}%</div>
      <div class="stat-lbl">Ø Fortschritt</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--gray)">${withItems.length}</div>
      <div class="stat-lbl">Aktive Tage</div>
    </div>`;

  // ── Streak calculation (current + best)
  // current streak: consecutive days ending today with pct>0
  let cur=0, best=0, run=0;
  const allDone = loadDone();
  // go back from today
  const todayD = new Date();
  for(let i=0; i<365; i++){
    const d2=new Date(todayD); d2.setDate(todayD.getDate()-i);
    const date2=ds(d2);
    const p=calcProgress(date2);
    if(p>0){ if(i===0||cur>0) cur++; }
    else if(i===0) break;
    else break;
  }
  // best streak all time
  const allItems=loadItems();
  // collect all dates that have items
  const allDates=new Set();
  allItems.forEach(it=>{ if(it.type==='once'&&it.date) allDates.add(it.date); });
  // also check done keys
  Object.keys(loadDone()).forEach(k=>{ const m=k.match(/\d{4}-\d{2}-\d{2}/); if(m) allDates.add(m[0]); });
  const sorted=[...allDates].sort();
  run=0;
  sorted.forEach(date=>{ const p=calcProgress(date); if(p>0){run++;best=Math.max(best,run);}else run=0; });

  document.getElementById('streak-cards').innerHTML=`
    <div class="streak-card">
      <div class="streak-card-val">${cur}</div>
      <div class="streak-card-lbl">Aktuelle Serie</div>
      <div class="streak-card-sub">Tage in Folge</div>
    </div>
    <div class="streak-card">
      <div class="streak-card-val">${best}</div>
      <div class="streak-card-lbl">Beste Serie</div>
      <div class="streak-card-sub">Tage in Folge</div>
    </div>`;

  // ── Heatmap
  const grid=document.getElementById('heatmap-grid');
  grid.innerHTML='';
  // Day labels
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>{
    const el=document.createElement('div'); el.className='heatmap-day-lbl'; el.textContent=d; grid.appendChild(el);
  });
  // first day of month offset (Mon=0)
  const firstDay = new Date(trackYear, trackMonth, 1).getDay();
  const offset   = (firstDay===0)?6:firstDay-1;
  for(let i=0;i<offset;i++){
    const el=document.createElement('div'); el.className='heatmap-cell hc-empty'; grid.appendChild(el);
  }
  dayData.forEach(({d,date,pct})=>{
    const el=document.createElement('div');
    let cls='heatmap-cell ';
    if(pct<0)       cls+='hc-none';
    else if(pct===0)cls+='hc-none';
    else if(pct<40) cls+='hc-low';
    else if(pct<70) cls+='hc-mid';
    else if(pct<100)cls+='hc-high';
    else            cls+='hc-full';
    if(date===today) cls+=' hc-today';
    el.className=cls;
    el.textContent=d;
    el.title=`${d}. ${MONTHS_S[trackMonth]}: ${pct<0?'Kein Eintrag':pct+'%'}`;
    grid.appendChild(el);
  });

  // ── Weekly bar chart (last 8 weeks)
  const barChart=document.getElementById('bar-chart');
  barChart.innerHTML='';
  const weeks=[];
  for(let w=7;w>=0;w--){
    const wStart=new Date(todayD); wStart.setDate(todayD.getDate()-todayD.getDay()+1-w*7);
    let sum=0, cnt=0;
    for(let d2=0;d2<7;d2++){
      const dd=new Date(wStart); dd.setDate(wStart.getDate()+d2);
      const p=calcProgress(ds(dd));
      if(p>=0){sum+=p;cnt++;}
    }
    const avg2=cnt?Math.round(sum/cnt):0;
    const label=`KW ${getISOWeek(wStart)}`;
    weeks.push({avg:avg2,cnt,label,isCurrent:w===0});
  }
  const maxAvg=Math.max(...weeks.map(w=>w.avg),1);
  weeks.forEach(w=>{
    const col=document.createElement('div'); col.className='bar-col';
    const pctH=Math.round((w.avg/100)*100);
    const barCls=w.avg===100?'bar-fill full-bar':w.isCurrent?'bar-fill active-bar':'bar-fill';
    col.innerHTML=`<div class="${barCls}" style="height:${pctH}%"></div><div class="bar-lbl">${w.label}</div>`;
    barChart.appendChild(col);
  });
}

function getISOWeek(date){
  const d=new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const yearStart=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

renderToday();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
